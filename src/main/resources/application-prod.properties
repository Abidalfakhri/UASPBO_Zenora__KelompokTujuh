# ===========================================================================
# Profile: prod
# Aktifkan dengan: java -jar zenora.jar --spring.profiles.active=prod
# Atau: export SPRING_PROFILES_ACTIVE=prod
# ===========================================================================

# Server
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-stacktrace=never

# Database — default tetap H2 file, tapi support PostgreSQL via env var
# Contoh: DATABASE_URL=jdbc:postgresql://host:5432/zenora
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/zenora_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console — WAJIB dimatikan di production
spring.h2.console.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.zenora=INFO
logging.level.org.springframework.security=WARN
