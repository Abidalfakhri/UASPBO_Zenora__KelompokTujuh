
# Server Port — REST API berjalan di port ini
server.port=8080

# H2 File-based Database — data tersimpan permanen di ./data/zenora_db.mv.db

spring.datasource.url=jdbc:h2:file:./data/zenora_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


# H2 Console — bisa diakses di http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Application name
spring.application.name=Zenora
